<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixtures &amp; Results — World Cup 2026</title>
<meta name="description" content="Every World Cup 2026 fixture and result, grouped by day in your local time. Filter by group, stage and team.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
</head>
<body data-page="fixtures.html">

<section class="page-hero">
  <div class="wrap">
    <div class="breadcrumb reveal"><a href="index.html">Home</a> / Fixtures</div>
    <h1 class="display reveal">Fixtures &amp; <span style="background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Results</span></h1>
    <p class="reveal">All 104 matches, grouped by day. Every kick-off is shown automatically in <b style="color:var(--green)" id="tzName">your local time</b> — no time-zone maths required.</p>
  </div>
</section>

<section class="section-tight">
  <div class="wrap">
    <div class="filterbar reveal">
      <input class="search-input" id="search" placeholder="🔍 Search a team…">
      <span style="width:1px;height:26px;background:var(--card-border)"></span>
      <button class="chip active" data-f="all">All</button>
      <button class="chip" data-f="live">🔴 Live</button>
      <button class="chip" data-f="upcoming">Upcoming</button>
      <button class="chip" data-f="finished">Results</button>
      <button class="chip" data-f="knockout">Knockouts</button>
      <button class="chip" data-f="fav">⭐ Following</button>
    </div>
    <div class="filterbar reveal" id="groupChips">
      <button class="chip active" data-g="all">All Groups</button>
    </div>
    <div id="fixtureList"></div>
  </div>
</section>

<script src="js/data.js"></script>
<script src="js/live-data.js"></script>
<script src="js/app.js"></script>
<script>
  $('#tzName').textContent = USER_TZ + (tzAbbr?` (${tzAbbr})`:'');
  // group chips
  const gc = $('#groupChips');
  GROUPS.forEach(g=>{ const b=el('button','chip','Group '+g); b.dataset.g=g; gc.appendChild(b); });

  let fStatus='all', fGroup='all', fSearch='';

  function passes(m){
    if(fStatus==='knockout'){ if(m.group) return false; }
    else if(fStatus==='fav'){ if(!(isFav(m.home)||isFav(m.away))) return false; }
    else if(fStatus!=='all' && m.status!==fStatus) return false;
    if(fGroup!=='all' && m.group!==fGroup) return false;
    if(fSearch){
      const h=team(m.home), a=team(m.away);
      const hay = `${h.name} ${a.name} ${h.code} ${a.code}`.toLowerCase();
      if(!hay.includes(fSearch)) return false;
    }
    return true;
  }

  let _jumped=false;
  const todayKey = new Date().toLocaleDateString([], {weekday:'long',month:'long',day:'numeric'});
  function render(){
    const list = $('#fixtureList'); list.innerHTML='';
    const matches = MATCHES.filter(passes).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
    if(!matches.length){ list.innerHTML='<div class="empty">No matches match your filters.</div>'; return; }
    // group by local day
    const byDay = {};
    matches.forEach(m=>{ const k=localDate(m.kickoff,{weekday:'long',month:'long',day:'numeric'}); (byDay[k] ||= []).push(m); });
    let todayHead=null, nextHead=null;
    Object.entries(byDay).forEach(([day,ms])=>{
      const head = el('div','section-head');
      head.style.cssText='margin:30px 0 16px';
      const isToday = day===todayKey;
      head.innerHTML = `<h2 class="display" style="font-size:1.3rem">📅 ${day}${isToday?' <span class="pill pill-green" style="vertical-align:middle">TODAY</span>':''}</h2><span class="muted" style="font-size:.85rem">${ms.length} match${ms.length>1?'es':''}</span>`;
      list.appendChild(head);
      if(isToday) todayHead=head;
      if(!nextHead && new Date(ms[0].kickoff)>=Date.now()-6*36e5) nextHead=head;
      const grid = el('div','grid'); grid.style.gridTemplateColumns='repeat(auto-fill,minmax(330px,1fr))';
      ms.forEach(m=>grid.appendChild(matchCard(m)));
      list.appendChild(grid);
    });
    // on first load, jump to today's matches (or the nearest upcoming day)
    if(!_jumped){ _jumped=true; const target=todayHead||nextHead;
      if(target) setTimeout(()=>{ const y=target.getBoundingClientRect().top+window.pageYOffset-80; window.scrollTo({top:y,behavior:'smooth'}); },200); }
  }

  $$('#groupChips .chip').forEach(c=>c.onclick=()=>{ $$('#groupChips .chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); fGroup=c.dataset.g; render(); });
  $$('.filterbar .chip[data-f]').forEach(c=>c.onclick=()=>{ $$('.chip[data-f]').forEach(x=>x.classList.remove('active')); c.classList.add('active'); fStatus=c.dataset.f; render(); });
  $('#search').oninput = e=>{ fSearch=e.target.value.trim().toLowerCase(); render(); };

  LiveData.refresh(render);
  setInterval(()=>LiveData.refresh(render), 30000);
</script>
</body>
</html>
