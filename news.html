<section class="page-hero">
  <div class="wrap">
    <div class="breadcrumb reveal"><a href="index.html">Home</a> / News</div>
    <h1 class="display reveal">World Cup <span style="background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Newsroom</span></h1>
    <p class="reveal">Live headlines pulled automatically from major outlets — in your local time. <span id="newsState" class="muted"></span></p>
  </div>
</section>

<section class="section-tight">
  <div class="wrap">
    <div class="filterbar reveal" id="srcChips"><button class="chip active" data-src="all">All sources</button></div>
    <div class="grid news-grid reveal" id="newsGrid"></div>
  </div>
</section>

<script src="js/data.js"></script>
<script src="js/news.js"></script>
<script src="js/app.js"></script>
<script>
  let ITEMS=[], fc='all';
  function timeAgo(d){ const s=(Date.now()-new Date(d))/1000; if(isNaN(s))return''; if(s<3600)return Math.max(1,s/60|0)+'m ago'; if(s<86400)return (s/3600|0)+'h ago'; return (s/86400|0)+'d ago'; }

  function buildChips(){
    const srcs=[...new Set(ITEMS.map(i=>i.src).filter(Boolean))];
    const cc=$('#srcChips'); cc.innerHTML='<button class="chip active" data-src="all">All sources</button>';
    srcs.forEach(s=>{ const b=el('button','chip',s); b.dataset.src=s; cc.appendChild(b); });
    $$('#srcChips .chip').forEach(c=>c.onclick=()=>{ $$('#srcChips .chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); fc=c.dataset.src; render(); });
  }
  function render(){
    const g=$('#newsGrid'); g.innerHTML='';
    let list = fc==='all'?ITEMS:ITEMS.filter(i=>i.src===fc);
    if(!list.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1">No headlines right now.</div>'; return; }
    list.slice(0,30).forEach((n,i)=>{
      const c=el('div','card news-card'+(i===0&&fc==='all'?' news-feature':''));
      const imgSrc=n.img||cityImg(n.title,'World Cup 2026');
      c.innerHTML=`<div class="news-img"><span class="cat">${n.src||'News'}</span><img src="${imgSrc}" alt="" referrerpolicy="no-referrer"></div>
        <div class="news-body"><div class="date">${n.date?localDate(n.date,{weekday:'short',month:'short',day:'numeric'}):''} ${n.date?('· '+localTime(n.date)):''} <span class="muted">· ${timeAgo(n.date)}</span></div>
        <h3>${n.title}</h3><p class="blurb">${n.blurb||''}</p><span class="link-more">Read full story ↗</span></div>`;
      const im=c.querySelector('.news-img img'); im.onerror=()=>{ im.onerror=null; im.src=cityImg(n.title,'World Cup 2026'); };
      a11yClick(c, ()=>window.open(n.link,'_blank','noopener'), `Read: ${n.title}`);
      g.appendChild(c);
    });
  }
  function renderFallback(){
    ITEMS = NEWS.map(n=>({ title:n.title, link:'#', date:n.date, blurb:n.blurb, img:'', src:n.cat }));
    const g=$('#newsGrid'); g.innerHTML='';
    [...NEWS].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach((n,i)=>{
      const c=el('div','card news-card'+(i===0?' news-feature':'')); const venue=stadium(n.img);
      c.innerHTML=`<div class="news-img"><span class="cat">${n.cat}</span><img src="${cityImg(n.img,venue.city||n.img)}" alt=""></div>
        <div class="news-body"><div class="date">${localDate(n.date,{weekday:'short',month:'short',day:'numeric'})} · ${localTime(n.date)}</div>
        <h3>${n.title}</h3><p class="blurb">${n.blurb}</p></div>`;
      g.appendChild(c); loadVenuePhoto(c.querySelector('.news-img img'), venue.wiki);
    });
  }
  async function loadNews(){
    $('#newsState').textContent='· refreshing…';
    const items = await NewsFeed.load();
    if(items && items.length){ ITEMS=items; buildChips(); render();
      $('#newsState').innerHTML = NewsFeed.live ? '· <span style="color:var(--green)">●</span> live · auto-updates' : '· showing last saved headlines (live feed unreachable)';
    } else { $('#newsState').textContent='· live feed unavailable — showing our desk'; renderFallback(); }
  }
  $('#newsGrid').innerHTML='<div class="empty" style="grid-column:1/-1">Loading the latest headlines…</div>';
  loadNews();
  setInterval(loadNews, 10*60000);
</script>
</body>
</html>
